name: Generate Ocean Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: chenarrr
          outputs: |
            dist/ocean.gif?color_snake=00D4FF&color_dots=#0d1117,#1a1b4b,#1e3a5f,#1a6b8a,#00D4FF&color_background=0d1117

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
