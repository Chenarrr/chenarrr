name: Generate Ocean Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: chenarrr
          outputs: |
            dist/ocean.gif?color_snake=00D4FF&color_dots=#0e2233,#0e3d5c,#0a6690,#0099cc,#00D4FF&color_background=090f1a

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
